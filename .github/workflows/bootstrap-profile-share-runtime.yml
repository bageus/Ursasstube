name: Bootstrap profile share runtime diagnostic

on:
  pull_request:
    branches:
      - sandbox/bootstrap-profile-share-runtime-base

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'sandbox/bootstrap-profile-share-runtime-exec'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/bootstrap-profile-share-runtime-result
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --silent
      - name: Capture profile/share focused test failures
        shell: bash
        run: |
          set +e
          : > profile-share-diagnostic.log
          run_cmd() {
            printf '\n>>> %s\n' "$*" >> profile-share-diagnostic.log
            "$@" >> profile-share-diagnostic.log 2>&1
            printf 'exit_status=%s\n' "$?" >> profile-share-diagnostic.log
          }
          run_cmd node scripts/cutover-bootstrap-profile-share.mjs
          node --input-type=module <<'NODE' >> profile-share-diagnostic.log 2>&1
          import { readFileSync, writeFileSync } from 'node:fs';
          const path = 'js/game/bootstrap.js';
          const budgetPath = 'scripts/check-js-size-budget.mjs';
          const lines = readFileSync(path, 'utf8').split('\n').length;
          const source = readFileSync(budgetPath, 'utf8');
          writeFileSync(budgetPath, source.replace(/\['js\/game\/bootstrap\.js',\s*\d+\]/, `['js/game/bootstrap.js', ${lines}]`));
          console.log(`budget_lines=${lines}`);
          NODE
          for file in \
            scripts/unused-code-ast.test.mjs \
            scripts/bootstrap-profile-share-staging.test.mjs \
            scripts/bootstrap-profile-share-cutover.test.mjs \
            scripts/bootstrap-rank-feedback-staging.test.mjs \
            scripts/bootstrap-rank-feedback-cutover.test.mjs \
            scripts/startup-performance.test.mjs \
            scripts/auth-callbacks.test.mjs \
            scripts/player-menu-history-web.test.mjs \
            scripts/telegram-auth-lifecycle.test.mjs; do
            run_cmd node --test "$file"
          done
          cat profile-share-diagnostic.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: bootstrap-profile-share-diagnostic
          path: profile-share-diagnostic.log
          if-no-files-found: error
