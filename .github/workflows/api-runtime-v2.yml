name: API runtime diagnostic

on:
  pull_request:
    branches:
      - sandbox/api-runtime-v2-base

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'sandbox/api-runtime-v2-exec'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/api-runtime-result-v2
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --silent
      - name: Capture API cutover failure
        shell: bash
        run: |
          set +e
          node scripts/cutover-api-account-share.mjs > api-diagnostic.log 2>&1
          status=$?
          printf '\nexit_status=%s\n' "$status" >> api-diagnostic.log
          cat api-diagnostic.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: api-cutover-diagnostic
          path: api-diagnostic.log
          if-no-files-found: error
