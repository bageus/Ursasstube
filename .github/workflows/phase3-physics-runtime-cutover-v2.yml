name: Phase 3 physics runtime cutover v2

on:
  pull_request:
    branches:
      - sandbox/phase3-physics-runtime-base-v2

permissions:
  contents: write

jobs:
  cutover:
    if: github.event.pull_request.head.ref == 'sandbox/phase3-physics-runtime-exec-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out execution branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply center-offset cutover
        run: node scripts/cutover-physics-center-offset.mjs

      - name: Apply camera-shake cutover
        run: node scripts/cutover-physics-camera-shake.mjs

      - name: Apply effect-timers cutover
        run: node scripts/cutover-physics-effect-timers.mjs

      - name: Tighten physics line budget
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const physicsPath = 'js/physics.js';
          const budgetPath = 'scripts/check-js-size-budget.mjs';
          const lines = readFileSync(physicsPath, 'utf8').split('\n').length;
          const source = readFileSync(budgetPath, 'utf8');
          const next = source.replace(/\['js\/physics\.js',\s*\d+\]/, `['js/physics.js', ${lines}]`);
          if (next === source) throw new Error('Physics budget entry was not updated');
          writeFileSync(budgetPath, next);
          console.log(`js/physics.js cutover size: ${lines} lines`);
          NODE

      - name: Validate syntax and extracted ownership
        run: |
          node --check js/physics.js
          node scripts/check-physics-collision-phase-staging.mjs
          node scripts/check-physics-progress-step-staging.mjs
          node scripts/check-physics-center-offset-staging.mjs
          node scripts/check-physics-camera-shake-staging.mjs
          node scripts/check-physics-effect-timers-staging.mjs
          npm run check:js-size-budget

      - name: Run focused physics tests
        run: |
          node --test \
            scripts/physics-collision-phase.test.mjs \
            scripts/physics-collision-phase-staging.test.mjs \
            scripts/physics-collision-phase-cutover.test.mjs \
            scripts/physics-progress-step.test.mjs \
            scripts/physics-progress-step-staging.test.mjs \
            scripts/physics-progress-step-cutover.test.mjs \
            scripts/physics-center-offset-step.test.mjs \
            scripts/physics-center-offset-staging.test.mjs \
            scripts/physics-center-offset-cutover.test.mjs \
            scripts/physics-camera-shake-step.test.mjs \
            scripts/physics-camera-shake-staging.test.mjs \
            scripts/physics-camera-shake-cutover.test.mjs \
            scripts/physics-effect-timers-step.test.mjs \
            scripts/physics-effect-timers-staging.test.mjs \
            scripts/physics-effect-timers-cutover.test.mjs

      - name: Verify isolated runtime diff
        run: |
          git diff --check
          expected=$(printf '%s\n' \
            'js/physics.js' \
            'scripts/check-js-size-budget.mjs' | sort)
          actual=$(git status --short | sed 's/^...//' | sort)
          test "$actual" = "$expected"

      - name: Commit clean runtime result
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/phase3-physics-runtime-cutover-v2.yml
          git add js/physics.js scripts/check-js-size-budget.mjs
          git commit -m 'Apply remaining pure physics runtime cutovers'
          git push origin "HEAD:${HEAD_BRANCH}"
