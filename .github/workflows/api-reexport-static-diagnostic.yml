name: API re-export static diagnostic

on:
  pull_request:
    branches:
      - sandbox/api-reexport-static-base

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'sandbox/api-reexport-static-exec'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/static-export-cleanup
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --silent
      - name: Remove stale test-only exports idempotently
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const removals = new Map([
            ['scripts/check-api-account-share-staging.mjs', ['extractDomainSection', 'normalizeSource']],
            ['scripts/check-bootstrap-rank-feedback-staging.mjs', ['EXPECTED_FUNCTIONS', 'REQUIRED_EXPORTS']],
            ['scripts/check-css-staged-sections.mjs', ['START_SCREEN_SECTIONS', 'analyzeSingleSection', 'analyzeStartScreen', 'assertImportOrder', 'assertOwnershipGroups', 'extractFeatureSection', 'stripLeaderboardImport']],
            ['scripts/check-physics-camera-shake-staging.mjs', ['CALL_MARKER']],
            ['scripts/check-physics-center-offset-staging.mjs', ['CALL_MARKER']],
            ['scripts/check-physics-collision-phase-staging.mjs', ['REQUIRED_EXPORTS']],
            ['scripts/check-physics-effect-timers-staging.mjs', ['CALL_MARKER']],
            ['scripts/check-physics-progress-step-staging.mjs', ['CALL_MARKER']],
            ['scripts/remove-css-staged-duplicates.mjs', ['SECTION_SPECS', 'assertOwnershipGroupsPresent', 'extractStagedSection', 'resolveSpecPaths']]
          ]);
          for (const [file, names] of removals) {
            const source = readFileSync(file, 'utf8');
            const start = source.lastIndexOf('\nexport {');
            const end = source.indexOf('\n};', start);
            if (start < 0 || end < 0) throw new Error(`${file}: final export block not found`);
            const target = new Set(names);
            const block = source.slice(start, end + 3);
            const nextBlock = block.split('\n').filter((line) => {
              const match = line.match(/^\s*([A-Za-z_$][\w$]*),?\s*$/);
              return !match || !target.has(match[1]);
            }).join('\n');
            if (nextBlock !== block) writeFileSync(file, `${source.slice(0, start)}${nextBlock}${source.slice(end + 3)}`);
          }
          NODE
      - name: Capture affected test output
        run: |
          node --test \
            scripts/unused-code-ast.test.mjs \
            scripts/api-account-share-staging.test.mjs \
            scripts/api-account-share-cutover.test.mjs \
            scripts/bootstrap-rank-feedback-staging.test.mjs \
            scripts/bootstrap-rank-feedback-cutover.test.mjs \
            scripts/css-staged-sections.test.mjs \
            scripts/remove-css-staged-duplicates.test.mjs \
            scripts/physics-camera-shake-staging.test.mjs \
            scripts/physics-camera-shake-cutover.test.mjs \
            scripts/physics-center-offset-staging.test.mjs \
            scripts/physics-center-offset-cutover.test.mjs \
            scripts/physics-collision-phase-staging.test.mjs \
            scripts/physics-collision-phase-cutover.test.mjs \
            scripts/physics-effect-timers-staging.test.mjs \
            scripts/physics-effect-timers-cutover.test.mjs \
            scripts/physics-progress-step-staging.test.mjs \
            scripts/physics-progress-step-cutover.test.mjs > affected-tests.txt 2>&1 || true
          tail -120 affected-tests.txt > affected-tests-tail.txt
          mv affected-tests-tail.txt affected-tests.txt
      - uses: actions/upload-artifact@v4
        with:
          name: affected-test-output
          path: affected-tests.txt
          if-no-files-found: error
