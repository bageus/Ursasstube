name: API re-export static diagnostic

on:
  pull_request:
    branches:
      - sandbox/api-reexport-static-base

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'sandbox/api-reexport-static-exec'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --silent
      - name: Capture static analysis violations
        run: |
          node scripts/check-static-analysis.mjs > static-analysis-output.txt 2>&1 || true
          tail -40 static-analysis-output.txt > static-analysis-tail.txt
          mv static-analysis-tail.txt static-analysis-output.txt
      - name: Upload diagnostic result
        uses: actions/upload-artifact@v4
        with:
          name: api-static-analysis-output
          path: static-analysis-output.txt
          if-no-files-found: error
