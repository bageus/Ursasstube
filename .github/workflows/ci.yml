name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bootstrap-cleanup:
    name: one-time bootstrap cleanup
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/1791-frontend-hardening'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply exact cleanup
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('js/game/bootstrap.js')
          source = path.read_text()
          before = "import { notifyError, notifySuccess } from '../notifier.js';"
          after = "import { notifyError } from '../notifier.js';"
          if before in source:
              if source.count(before) != 1:
                  raise SystemExit('expected exactly one notifySuccess import')
              path.write_text(source.replace(before, after))
          Path('.github/workflows/apply-1791-bootstrap-fix.yml').unlink(missing_ok=True)
          PY
          git diff --check
      - name: Commit cleanup when needed
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add js/game/bootstrap.js .github/workflows/apply-1791-bootstrap-fix.yml
          git commit -m "remove unused bootstrap notifier import"
          git push origin HEAD:${{ github.head_ref }}

  static-checks:
    name: static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify Node major version (22+)
        run: node -e "const major = Number(process.versions.node.split('.')[0]); if (!Number.isFinite(major) || major < 22) { console.error('Node 22+ is required, current:', process.versions.node); process.exit(1); } console.log('Node version OK:', process.versions.node);"
      - name: Install dependencies
        run: npm ci
      - name: Syntax check
        run: npm run check:syntax
      - name: Static analysis
        id: static-analysis
        run: |
          set +e
          npm run check:static-analysis > static-analysis.log 2>&1
          status=$?
          cat static-analysis.log
          exit "$status"
      - name: Upload static-analysis diagnostics
        if: failure() && steps.static-analysis.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-diagnostics
          path: static-analysis.log
          if-no-files-found: error
      - name: UI and asset guardrails
        run: |
          npm run check:ui-buttons
          npm run check:unused-code
          npm run check:no-window-assign
          npm run check:asset-paths
          npm run check:no-legacy-canvas-runtime

  tests:
    name: node tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run node test suite
        id: node-tests
        run: |
          set +e
          npm run test:request > node-tests.log 2>&1
          status=$?
          cat node-tests.log
          exit "$status"
      - name: Upload node-test diagnostics
        if: failure() && steps.node-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: node-test-diagnostics
          path: node-tests.log
          if-no-files-found: error

  smoke:
    name: e2e smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run smoke suite
        run: npm run test:e2e-smoke

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build production bundle
        run: npm run build

  security:
    name: security audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Security gate
        run: npm run check:security
