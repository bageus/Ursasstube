name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify Node major version (22+)
        run: node -e "const major = Number(process.versions.node.split('.')[0]); if (!Number.isFinite(major) || major < 22) { console.error('Node 22+ is required, current:', process.versions.node); process.exit(1); } console.log('Node version OK:', process.versions.node);"

      - name: Install dependencies, checks and build (sanitized npm env)
        shell: bash
        run: |
          unset NPM_CONFIG_HTTP_PROXY npm_config_http_proxy NPM_CONFIG_HTTPS_PROXY npm_config_https_proxy
          npm ci
          npm run check
          npm run build
