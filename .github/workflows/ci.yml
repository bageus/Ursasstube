name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-checks:
    name: static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify Node major version (22+)
        run: node -e "const major = Number(process.versions.node.split('.')[0]); if (!Number.isFinite(major) || major < 22) { console.error('Node 22+ is required, current:', process.versions.node); process.exit(1); } console.log('Node version OK:', process.versions.node);"
      - name: Install dependencies
        run: npm ci
      - name: Syntax check
        run: npm run check:syntax
      - name: Static analysis
        id: static-analysis
        run: |
          set +e
          npm run check:static-analysis > static-analysis.log 2>&1
          status=$?
          cat static-analysis.log
          exit "$status"
      - name: Upload static-analysis diagnostics
        if: failure() && steps.static-analysis.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-diagnostics
          path: static-analysis.log
          if-no-files-found: error
      - name: UI and asset guardrails
        run: |
          npm run check:ui-buttons
          npm run check:unused-code
          npm run check:no-window-assign
          npm run check:asset-paths
          npm run check:no-legacy-canvas-runtime

  tests:
    name: node tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run node test suite
        id: node-tests
        run: |
          set +e
          npm run test:request > node-tests.log 2>&1
          status=$?
          cat node-tests.log
          exit "$status"
      - name: Upload node-test diagnostics
        if: failure() && steps.node-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: node-test-diagnostics
          path: node-tests.log
          if-no-files-found: error

  smoke:
    name: e2e smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run smoke suite
        run: npm run test:e2e-smoke

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build production bundle
        run: npm run build

  security:
    name: security audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Security gate
        run: npm run check:security
