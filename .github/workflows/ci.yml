name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies, checks and build (sanitized npm env)
        shell: bash
        run: |
          unset NPM_CONFIG_HTTP_PROXY npm_config_http_proxy NPM_CONFIG_HTTPS_PROXY npm_config_https_proxy
          npm ci
          npm run check
          npm run build
