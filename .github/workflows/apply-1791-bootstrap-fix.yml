name: Apply 1791 bootstrap cleanup

on:
  push:
    branches:
      - agent/1791-frontend-hardening

permissions:
  contents: write

jobs:
  patch-bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: agent/1791-frontend-hardening
          fetch-depth: 0
      - name: Remove unused notifier import
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('js/game/bootstrap.js')
          source = path.read_text()
          before = "import { notifyError, notifySuccess } from '../notifier.js';"
          after = "import { notifyError } from '../notifier.js';"
          if source.count(before) != 1:
              raise SystemExit('expected exactly one notifySuccess import')
          path.write_text(source.replace(before, after))
          PY
          rm .github/workflows/apply-1791-bootstrap-fix.yml
          git diff --check
          git diff --exit-code -- js/game/bootstrap.js | grep -F "-import { notifyError, notifySuccess } from '../notifier.js';"
          git diff --exit-code -- js/game/bootstrap.js | grep -F "+import { notifyError } from '../notifier.js';"
      - name: Commit cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add js/game/bootstrap.js .github/workflows/apply-1791-bootstrap-fix.yml
          git commit -m "remove unused bootstrap notifier import"
          git push origin HEAD:agent/1791-frontend-hardening
