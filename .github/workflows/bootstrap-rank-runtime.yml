name: Bootstrap rank runtime diagnostic

on:
  pull_request:
    branches:
      - sandbox/bootstrap-rank-runtime-base

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'sandbox/bootstrap-rank-runtime-exec'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/bootstrap-rank-runtime-result
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --silent
      - name: Capture rank cutover validation
        shell: bash
        run: |
          set +e
          : > rank-diagnostic.log
          run_cmd() {
            printf '\n>>> %s\n' "$*" >> rank-diagnostic.log
            "$@" >> rank-diagnostic.log 2>&1
            printf 'exit_status=%s\n' "$?" >> rank-diagnostic.log
          }
          run_cmd node scripts/cutover-bootstrap-rank-feedback.mjs
          node --input-type=module <<'NODE' >> rank-diagnostic.log 2>&1
          import { readFileSync, writeFileSync } from 'node:fs';
          const path = 'js/game/bootstrap.js';
          const budgetPath = 'scripts/check-js-size-budget.mjs';
          const lines = readFileSync(path, 'utf8').split('\n').length;
          const source = readFileSync(budgetPath, 'utf8');
          writeFileSync(budgetPath, source.replace(/\['js\/game\/bootstrap\.js',\s*\d+\]/, `['js/game/bootstrap.js', ${lines}]`));
          console.log(`budget_lines=${lines}`);
          NODE
          run_cmd node --check js/game/bootstrap.js
          run_cmd node --check js/game/bootstrap/rank-feedback.js
          run_cmd node scripts/check-bootstrap-rank-feedback-staging.mjs
          run_cmd node scripts/check-bootstrap-profile-share-staging.mjs
          run_cmd node scripts/check-js-size-budget.mjs
          run_cmd node scripts/check-syntax.mjs
          run_cmd node scripts/check-static-analysis.mjs
          run_cmd node scripts/check-unused-code.mjs
          cat rank-diagnostic.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: bootstrap-rank-diagnostic
          path: rank-diagnostic.log
          if-no-files-found: error
