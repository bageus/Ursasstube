<svg width="1280" height="1040" viewBox="0 0 1280 1040" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #f8fafc; }
    .subtitle { font: 700 19px Arial, sans-serif; fill: #cbd5e1; }
    .text { font: 16px Arial, sans-serif; fill: #e2e8f0; }
    .small { font: 14px Arial, sans-serif; fill: #cbd5e1; }
    .mono { font: 14px 'Courier New', monospace; fill: #bfdbfe; }
    .chip { font: 700 15px Arial, sans-serif; fill: #0f172a; }
  </style>

  <rect width="1280" height="1040" rx="24" fill="#020617"/>
  <text x="42" y="52" class="title">Как реально работают столкновения</text>
  <text x="42" y="84" class="text">Не по пикселям спрайта, а по: 1) окну глубины z, 2) логической полосе lane или спец-правилу spin / magnet.</text>

  <rect x="34" y="114" width="1212" height="336" rx="20" fill="#0f172a" stroke="#334155"/>
  <text x="58" y="150" class="subtitle">1. Окна столкновений по глубине z</text>
  <text x="58" y="176" class="small">CONFIG.PLAYER_Z = 0.3, CONFIG.TUBE_Z_STEP = 0.086</text>

  <line x1="130" y1="300" x2="1160" y2="300" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <polygon points="1160,300 1136,288 1136,312" fill="#94a3b8"/>

  <line x1="250" y1="260" x2="250" y2="340" stroke="#22c55e" stroke-width="6"/>
  <text x="214" y="248" class="mono">z = 0.3000</text>
  <rect x="204" y="346" width="92" height="34" rx="10" fill="#22c55e"/>
  <text x="230" y="368" class="chip">PLAYER</text>

  <rect x="345" y="236" width="122" height="56" rx="14" fill="#ef4444" fill-opacity="0.22" stroke="#ef4444" stroke-width="2"/>
  <text x="360" y="268" class="mono">0.3688..0.4892</text>
  <text x="352" y="320" class="text">Obstacle hit</text>

  <rect x="506" y="220" width="122" height="72" rx="14" fill="#f59e0b" fill-opacity="0.22" stroke="#f59e0b" stroke-width="2"/>
  <text x="521" y="252" class="mono">0.3559..0.5021</text>
  <text x="530" y="320" class="text">Bonus pick-up</text>

  <rect x="667" y="206" width="122" height="86" rx="14" fill="#38bdf8" fill-opacity="0.22" stroke="#38bdf8" stroke-width="2"/>
  <text x="682" y="238" class="mono">0.3473..0.5107</text>
  <text x="681" y="320" class="text">Coin by lane</text>

  <rect x="828" y="192" width="122" height="100" rx="14" fill="#a78bfa" fill-opacity="0.22" stroke="#a78bfa" stroke-width="2"/>
  <text x="842" y="224" class="mono">0.3344..0.5236</text>
  <text x="836" y="320" class="text">Coin by spin</text>

  <rect x="989" y="176" width="122" height="116" rx="14" fill="#10b981" fill-opacity="0.22" stroke="#10b981" stroke-width="2"/>
  <text x="1010" y="208" class="mono">-0.1..0.7</text>
  <text x="997" y="232" class="mono">Perfect Spin</text>
  <text x="1010" y="320" class="text">Ring collect</text>

  <text x="58" y="398" class="text">Почему hit ощущается ранним: obstacle считается уже в зоне 0.3688..0.4892, то есть впереди PLAYER_Z = 0.3.</text>
  <text x="58" y="424" class="text">Спрайт при этом может выглядеть "ещё не вплотную", потому что рендер масштабируется по перспективе.</text>

  <rect x="34" y="476" width="1212" height="248" rx="20" fill="#0f172a" stroke="#334155"/>
  <text x="58" y="512" class="subtitle">2. Визуальная полоса ≠ логическая полоса во время transition</text>

  <rect x="88" y="560" width="260" height="120" rx="18" fill="#111827" stroke="#475569"/>
  <text x="118" y="594" class="subtitle">Кадр 1</text>
  <text x="118" y="624" class="mono">player.lane = 0</text>
  <text x="118" y="648" class="mono">targetLane = +1</text>
  <text x="118" y="672" class="text">спрайт ещё в центре</text>

  <rect x="384" y="560" width="260" height="120" rx="18" fill="#111827" stroke="#475569"/>
  <text x="414" y="594" class="subtitle">Кадр 3</text>
  <text x="414" y="624" class="mono">player.lane = 0</text>
  <text x="414" y="648" class="mono">targetLane = +1</text>
  <text x="414" y="672" class="text">спрайт уже почти справа</text>

  <rect x="680" y="560" width="260" height="120" rx="18" fill="#111827" stroke="#475569"/>
  <text x="710" y="594" class="subtitle">Кадр 6</text>
  <text x="710" y="624" class="mono">player.lane = +1</text>
  <text x="710" y="648" class="mono">targetLane = +1</text>
  <text x="710" y="672" class="text">теперь логика тоже справа</text>

  <rect x="976" y="560" width="206" height="120" rx="18" fill="#1f2937" stroke="#475569"/>
  <text x="1004" y="598" class="text">Вывод:</text>
  <text x="1004" y="628" class="small">на экране ты уже</text>
  <text x="1004" y="650" class="small">почти на новой линии,</text>
  <text x="1004" y="672" class="small">а hit-check ещё по старой</text>

  <text x="58" y="708" class="text">Поэтому бывает так: объект визуально "на моей линии", я к нему подъезжаю, а obstacle/bonus/обычная coin ещё не срабатывают.</text>

  <rect x="34" y="750" width="1212" height="250" rx="20" fill="#0f172a" stroke="#334155"/>
  <text x="58" y="786" class="subtitle">3. Правила по типам объектов</text>

  <rect x="74" y="826" width="252" height="124" rx="16" fill="#111827" stroke="#475569"/>
  <text x="96" y="858" class="subtitle">Obstacle / Bonus</text>
  <text x="96" y="888" class="text">Нужно одновременно:</text>
  <text x="96" y="914" class="mono">same lane</text>
  <text x="96" y="936" class="mono">+ z inside window</text>

  <rect x="356" y="826" width="252" height="124" rx="16" fill="#111827" stroke="#475569"/>
  <text x="378" y="858" class="subtitle">Normal coin</text>
  <text x="378" y="888" class="text">Тоже same lane,</text>
  <text x="378" y="914" class="text">но окно глубины шире.</text>
  <text x="378" y="936" class="mono">0.3473..0.5107</text>

  <rect x="638" y="826" width="252" height="124" rx="16" fill="#111827" stroke="#475569"/>
  <text x="660" y="858" class="subtitle">Spin coin</text>
  <text x="660" y="888" class="text">lane не обязателен,</text>
  <text x="660" y="914" class="text">если активен spin.</text>
  <text x="660" y="936" class="mono">player.isSpin === true</text>

  <rect x="920" y="826" width="252" height="124" rx="16" fill="#111827" stroke="#475569"/>
  <text x="942" y="858" class="subtitle">Magnet</text>
  <text x="942" y="888" class="text">Смотрит не на lane,</text>
  <text x="942" y="914" class="text">а на экранную дистанцию.</text>
  <text x="942" y="936" class="mono">radius check on screen</text>

  <text x="58" y="978" class="text">Итог: если хочешь визуально честнее ощущение, нужно менять не только спрайты, а сами окна z и момент обновления player.lane.</text>
</svg>
