<script>
/* ===== CONFIG ===== */
const BACKEND_URL = "https://ursassbackend-production.up.railway.app";
console.log(`🔗 Backend URL: ${BACKEND_URL}`);
const CONFIG = {
  LANES: [-1, 0, 1],

};

const BONUS_TYPES = {
  SHIELD: "shield",
  X2: "x2",
  SPEED_DOWN: "speed_down",
  SPEED_UP: "speed_up",
  MAGNET: "magnet",
  INVERT: "invert",
  SCORE_300: "score_300",
  SCORE_500: "score_500"
};

/* ===== DOM CACHE ===== */
const DOM = {
  canvas: document.getElementById("game"),
  gameStart: document.getElementById("gameStart"),
  gameOver: document.getElementById("gameOver"),
  finalScore: document.getElementById("finalScore"),
  
  // UI Elements
  distanceVal: document.getElementById("distanceVal"),
  scoreVal: document.getElementById("scoreVal"),
  shieldVal: document.getElementById("shieldVal"),
  magnetVal: document.getElementById("magnetVal"),
  invertVal: document.getElementById("invertVal"),

  goldVal: document.getElementById("goldVal"),

  leaderboardList: document.getElementById("leaderboardList")
};

const ctx = DOM.canvas.getContext("2d", { alpha: false, antialias: false });

/* ===== ASSET MANAGER ===== */
class AssetManager {
  constructor() {
    this.assets = {
      atlas: null,
      atlas2: null
    };
    this.loading = 0;
    this.loaded = 0;
  }

  async loadAll() {
    return Promise.all([
      this.loadImage('atlas', 'assets/character_atlas.png'),
      this.loadImage('atlas2', 'assets/objects_atlas.png')
    ]);
  }

  loadImage(name, src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        this.assets[name] = img;
        this.loaded++;
        resolve(img);
      };
      img.onerror = () => {
        console.error(`Failed to load ${name}: ${src}`);
        this.loaded++;
        resolve(null);
      };
      img.src = src;
      this.loading++;
    });
  }

  getAsset(name) {
    return this.assets[name];
  }

  isReady() {
    return this.loaded === this.loading;
  }

  getProgress() {
    return this.loading === 0 ? 0 : (this.loaded / this.loading) * 100;
  }
}

const assetManager = new AssetManager();

/* ===== AUDIO MANAGER ===== */
class AudioManager {
  constructor() {
    this.ctx = null;
    this.volume = 0.3;
    this.enabled = true;
    
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      console.warn("Web Audio API не доддерживается");
    }
  }

  play(type, options = {}) {
    if(!this.ctx || !this.enabled) return;

    const sounds = {
      coin: { freq: 800, duration: 0.1 },
      bonus: { freq: 1200, duration: 0.2 },
      hit: { freq: 200, duration: 0.3 },
      spin: { freq: 600, duration: 0.25 }
    };

    const sound = sounds[type] || sounds.coin;
    const freq = options.freq || sound.freq;
    const duration = options.duration || sound.duration;

    try {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(this.volume, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
      
      osc.start(this.ctx.currentTime);
      osc.stop(this.ctx.currentTime + duration);
    } catch(e) {
      console.error("Audio error:", e);
    }
  }
}

const audio = new AudioManager();

/* ===== PARTICLE SYSTEM ===== */


class Particle {
  constructor(x, y, vx, vy, color, life = 30) {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.color = color;
    this.life = life;
    this.age = 0;
    this.size = 5;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.2;
    this.age++;
    return this.age < this.life;  // ✅ Возвращаем true если живой
  }

  draw(ctx) {
    const alpha = 1 - (this.age / this.life);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  isDead() {
    return this.age >= this.life;
  }
}

const particles = [];

function spawnParticles(x, y, color, count = 8, speed = 5) {
  // ✅ Ограничиваем максимум частиц
  if(particles.length > 500) {
    console.warn("⚠️ Слишком много частиц, очищаю старые");
    particles.length = 0;
  }

  for(let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count;
    particles.push(new Particle(
      x, y, 
      Math.cos(angle) * speed, 
      Math.sin(angle) * speed, 
      color, 
      30
    ));
  }
}

function updateParticles() {
  // ✅ Фильтруем мёртвые частицы эффективнее
  for(let i = particles.length - 1; i >= 0; i--) {
    if(!particles[i].update()) {
      particles.splice(i, 1);
    }
  }
}

function drawParticles() {
  particles.forEach(p => p.draw(ctx));
}

const curves = {

};

const obstacles = [];
const bonuses = [];
const coins = [];

let laneCooldown = 0;
let bestScore = localStorage.getItem("bestScore") || 0;
let bestDistance = localStorage.getItem("bestDistance") || 0;

let web3 = null;
let userWallet = null;
let isWalletConnected = false;

/* ===== ANIMATIONS ===== */
const Animations = {
  idle_left: { row: 0, start: 0, end: 3 },
  idle_right: { row: 0, start: 4, end: 7 },
  idle_center: { row: 1, start: 0, end: 7 },

/* ===== RESIZE ===== */
function resizeCanvas() {
  const rect = DOM.canvas.parentElement.getBoundingClientRect();
  DOM.canvas.width = rect.width;
  DOM.canvas.height = rect.height;
}

window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 100);

/* ===== TUBE TEXTURE ===== */
const tubeTextureCanvas = document.createElement("canvas");
const tubeTexCtx = tubeTextureCanvas.getContext("2d");
tubeTextureCanvas.width = CONFIG.TEX_SIZE;
tubeTextureCanvas.height = CONFIG.TEX_SIZE;

function generateTubeTexture() {
  for(let y = 0; y < CONFIG.TEX_SIZE; y += CONFIG.TEX_PIXEL_SIZE) {
    for(let x = 0; x < CONFIG.TEX_SIZE; x += CONFIG.TEX_PIXEL_SIZE) {
      const r = 140 + Math.random() * 20;
      const g = 60 + Math.random() * 20;
      const b = 70 + Math.random() * 15;
      tubeTexCtx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      tubeTexCtx.fillRect(x, y, CONFIG.TEX_PIXEL_SIZE, CONFIG.TEX_PIXEL_SIZE);
      
      if(Math.random() < 0.06) {
        tubeTexCtx.fillStyle = "rgb(180,40,60)";
        tubeTexCtx.fillRect(x, y, CONFIG.TEX_PIXEL_SIZE, CONFIG.TEX_PIXEL_SIZE);
      }
    }
  }
}
generateTubeTexture();

/* ===== INPUT HANDLERS ===== */
let touchStartX = 0;

document.addEventListener("touchstart", e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });

document.addEventListener("touchmove", e => {
  if(!gameState.running) return;
  const diff = e.touches[0].clientX - touchStartX;
  if(Math.abs(diff) > 50) {
    inputQueue.push(diff < 0 ? -1 : 1);
    touchStartX = e.touches[0].clientX;
  }
}, { passive: true });

let lastTap = 0;
document.addEventListener("touchend", e => {
  const now = Date.now();
  if(now - lastTap < 300 && !gameState.spinActive && !player.isLaneTransition) {
    triggerSpin();
  }
  lastTap = now;
}, { passive: true });

document.addEventListener("keydown", e => {
  if(!gameState.running) return;
  
  if(e.code === "ArrowLeft") {
    inputQueue.push(player.invertActive ? 1 : -1);
  } else if(e.code === "ArrowRight") {
    inputQueue.push(player.invertActive ? -1 : 1);
  } else if(e.code === "Space") {
    if(!gameState.spinActive && !player.isLaneTransition && gameState.spinCooldown <= 0) {
      triggerSpin();
    }
  }
});

/* ===== GAME FUNCTIONS ===== */
function startGame() {
  DOM.gameStart.classList.add("hidden");
  gameState.running = true;
  gameState.distance = 0;
  gameState.score = 0;
  gameState.speed = CONFIG.SPEED_START;
  gameState.baseMultiplier = 1;
  gameState.silverCoins = 0;
  gameState.goldCoins = 0;
  gameState.curveTimer = 0;
  gameState.lastTime = performance.now();
  
  curves.current.direction = 0;
  curves.current.strength = 0;
  curves.next.direction = Math.random() * Math.PI * 2;
  curves.next.strength = 0.5 + Math.random() * 0.5;
  
  player.lane = 0;
  player.targetLane = 0;
  player.shield = false;
  
  obstacles.length = 0;
  bonuses.length = 0;
  coins.length = 0;
  particles.length = 0;
}

function triggerSpin() {
  if(gameState.spinCooldown > 0 || gameState.spinActive || player.isLaneTransition) return;
  
  gameState.spinActive = true;
  gameState.spinProgress = 0;  // 0 до 1 (или 0 до CONFIG.SPIN_DURATION)
  gameState.spinCooldown = CONFIG.SPIN_COOLDOWN_TIME;
  
  audio.play("spin");
  spawnParticles(DOM.canvas.width/2, DOM.canvas.height/2, "rgba(200, 100, 255, 1)", 25, 10);
}

function endGame(reason = "Unknown") {
  gameState.running = false;
  audio.play("hit");
  spawnParticles(DOM.canvas.width/2, DOM.canvas.height/2, "rgba(255, 0, 0, 1)", 30, 12);
  
  if(gameState.score > bestScore) {
    bestScore = gameState.score;
    localStorage.setItem("bestScore", bestScore);
  }
  if(gameState.distance > bestDistance) {
    bestDistance = gameState.distance;
    localStorage.setItem("bestDistance", bestDistance);
  }
  
  // ✅ Сохраняем результат в лидерборд
  saveResultToLeaderboard();
  
  const duration = ((gameState.distance / gameState.speed / 50) / 60).toFixed(1);
  
  DOM.finalScore.innerHTML = `
    <div style="font-size:18px;line-height:1.6;">
      <div style="color:#ff6b6b;font-size:12px;margin-bottom:8px;">Причина: ${reason}</div>
      <div>🛹 Distance: <span style="color:#ffff00;">${Math.floor(gameState.distance)} м</span></div>
      <div style="margin-top:8px;">⭐ Score: <span style="color:#ffff00;">${Math.floor(gameState.score)}</span></div>
      <hr style="border:1px solid #555;margin:12px 0;">
      <div style="color:#ffee99;font-size:14px;">
        <div>💛 Gold: <strong>${gameState.goldCoins}</strong></div>
        <div>⭐ Silver: <strong>${gameState.silverCoins}</strong></div>
        <div style="margin-top:8px;opacity:0.8;">⏱ ${duration}s</div>
      </div>
    </div>
  `;
  
  // ✅ НОВОЕ: Загружаем лидерборд на странице Game Over
  loadAndDisplayLeaderboard();
  
  DOM.gameOver.classList.add("visible");
}

/* ===== SPAWN FUNCTIONS ===== */
function getSpacing(type) {
  const spacing = type === "obstacle" ? CONFIG.OBSTACLE_SPACING : CONFIG.BONUS_SPACING;
  if(gameState.distance < 1000) return spacing[0];
  if(gameState.distance < 2000) return spacing[1];
  return spacing[2];
}

function isLaneOccupied(lane, checkZ, zRange = 0.3) {
  return obstacles.some(o => o.lane === lane && Math.abs(o.z - checkZ) < zRange) ||
         bonuses.some(b => b.lane === lane && Math.abs(b.z - checkZ) < zRange);
}

function spawnBonus() {
  if(bonuses.length >= CONFIG.MAX_BONUSES) return;

  const roll = Math.random();
  let type = BONUS_TYPES.SCORE_300;

  if(roll < 0.10) type = BONUS_TYPES.SHIELD;
  else if(roll < 0.18) type = BONUS_TYPES.SPEED_DOWN;
  else if(roll < 0.26) type = BONUS_TYPES.SPEED_UP;
  else if(roll < 0.35) type = BONUS_TYPES.MAGNET;
  else if(roll < 0.45) type = BONUS_TYPES.X2;
  else if(roll < 0.55) type = BONUS_TYPES.SCORE_500;
  else if(roll < 0.65) type = BONUS_TYPES.INVERT;

  const spawnZ = 1.65;
  let lane = null;
  
  for(let attempt = 0; attempt < 3; attempt++) {
    const testLane = CONFIG.LANES[Math.floor(Math.random() * 3)];
    if(!isLaneOccupied(testLane, spawnZ)) {
      lane = testLane;
      break;
    }
  }
  
  if(lane !== null) {
    bonuses.push({ lane, z: spawnZ, size: 27, type, animFrame: 0 });
  }
}

function spawnObstacle() {
  if(obstacles.length >= CONFIG.MAX_OBSTACLES) return;

  const types = ["pit", "spikes", "bottles", "wall_brick", "wall_kactus", "tree", "rock1", "rock2", "fence", "bull"];
  const subtype = types[Math.floor(Math.random() * types.length)];
  
  const spawnZ = 1.65;
  
  let groupSize = 1;
  if(gameState.distance >= 1000) groupSize = Math.random() < 0.6 ? 2 : 1;
  if(gameState.distance >= 2000) groupSize = Math.random() < 0.7 ? 3 : 2;

  const availableLanes = [...CONFIG.LANES];
  
  for(let i = 0; i < groupSize && availableLanes.length > 0; i++) {
    let foundLane = null;
    
    for(let attempt = 0; attempt < 3 && availableLanes.length > 0; attempt++) {
      const idx = Math.floor(Math.random() * availableLanes.length);
      const testLane = availableLanes[idx];
      
      if(!isLaneOccupied(testLane, spawnZ + i * 0.15)) {
        foundLane = testLane;
        availableLanes.splice(idx, 1);
        break;
      }
    }
    
    if(foundLane === null && availableLanes.length > 0) {
      foundLane = availableLanes.pop();
    }
    
    if(foundLane !== null) {
      obstacles.push({
        lane: foundLane,
        z: spawnZ + i * 0.15,
        size: 39,
        subtype,
        animFrame: 0
      });
    }
  }
}

function spawnCoinPattern() {
  const patterns = [spawnCoinLine, spawnCoinSnake, spawnCoinDiagonal, spawnCoinTwoLines, spawnCoinCircle];
  patterns[Math.floor(Math.random() * patterns.length)]();
}

function spawnCoinLine() {
  const lane = CONFIG.LANES[Math.floor(Math.random() * 3)];
  const hasGold = Math.random() < 0.3;
  for(let i = 0; i < 3; i++) {
    coins.push({
      type: i === 0 && hasGold ? "gold" : "silver",
      lane,
      z: 1.55 - i * 0.1,
      animFrame: 0
    });
  }
}

function spawnCoinSnake() {
  const startLane = CONFIG.LANES[Math.floor(Math.random() * 3)];
  const hasGold = Math.random() < 0.3;
  coins.push({ type: hasGold ? "gold" : "silver", lane: startLane, z: 1.55, animFrame: 0 });
  coins.push({ type: "silver", lane: Math.max(-1, Math.min(1, startLane + (Math.random() < 0.5 ? -1 : 1))), z: 1.45, animFrame: 0 });
  coins.push({ type: "silver", lane: startLane, z: 1.35, animFrame: 0 });
}

function spawnCoinDiagonal() {
  const hasGold = Math.random() < 0.3;
  [-1, 0, 1].forEach((lane, i) => {
    coins.push({
      type: i === 0 && hasGold ? "gold" : "silver",
      lane,
      z: 1.55 - i * 0.1,
      animFrame: 0
    });
  });
}

function spawnCoinTwoLines() {
  const hasGold = Math.random() < 0.3;
  [-1, 1].forEach((lane, lineIdx) => {
    for(let i = 0; i < 3; i++) {
      coins.push({
        type: lineIdx === 0 && i === 0 && hasGold ? "gold" : "silver",
        lane,
        z: 1.55 - i * 0.1,
        animFrame: 0
      });
    }
  });
}

function spawnCoinCircle() {
  const hasGold = Math.random() < 0.4;
  CONFIG.LANES.forEach((lane, idx) => {
    coins.push({
      type: idx === 0 && hasGold ? "gold_spin" : "silver",
      lane,
      z: 1.5 + Math.random() * 0.1,
      animFrame: 0,
      isCircle: true
    });
  });
}

function spawnCoinCircleInner() {
  const hasGold = Math.random() < 0.3;
  const positions = [
    Math.PI * 1.5 - 0.2, Math.PI * 1.5, Math.PI * 1.5 + 0.2,
    Math.PI * 0.5 - 0.2, Math.PI * 0.5, Math.PI * 0.5 + 0.2,
    Math.PI - 0.2, Math.PI, Math.PI + 0.2,
    -0.2, 0, 0.2,
    Math.PI * 1.75, Math.PI * 1.25, Math.PI * 0.5 + 0.5
  ];
  
  positions.forEach((angle, idx) => {
    coins.push({
      type: idx === 0 && hasGold ? "gold_spin" : "silver",
      z: 1.5 + Math.random() * 0.05,
      angle,
      radiusFactor: 0.65,
      isCircleInner: true,
      animFrame: 0
    });
  });
}

function spawnCoinCluster() {
  const lane = CONFIG.LANES[Math.floor(Math.random() * 3)];
  const hasGold = Math.random() < 0.3;
  
  if(Math.random() < 0.7) {
    const count = Math.random() < 0.5 ? 2 : 3;
    for(let i = 0; i < count; i++) {
      coins.push({
        type: "silver",
        lane,
        z: 1.5 - i * 0.08,
        animFrame: 0
      });
    }
  } else {
    coins.push({ type: "gold", lane, z: 1.5, animFrame: 0 });
  }
}

/* ===== PROJECTION ===== */
function project(lane, z) {
  const scale = Math.max(0.05, 1 - z);
  const r = CONFIG.TUBE_RADIUS * scale;
  const angle = lane * 0.55;

  return {
    x: DOM.canvas.width / 2 + Math.sin(angle) * r,
    y: DOM.canvas.height / 2 + Math.cos(angle) * r * CONFIG.PLAYER_OFFSET,
    scale,
    angle
  };
}

function projectPlayer(z) {
  if(!isFinite(z)) z = CONFIG.PLAYER_Z;
  const scale = Math.max(0.05, 1 - z);
  const r = CONFIG.TUBE_RADIUS * scale;
  
  let angleLane = player.lane;
  if(player.isLaneTransition) {
    const t = player.laneAnimFrame / CONFIG.LANE_TRANSITION_FRAMES;
    angleLane = player.lanePrev + (player.targetLane - player.lanePrev) * t;
  }
  
  // ✅ ГЛАВНОЕ: Добавляем спин ротацию к углу
  let spinRotation = 0;
  if(gameState.spinActive) {
    const spinProgress = gameState.spinProgress / CONFIG.SPIN_DURATION;  // 0 к 1
    spinRotation = spinProgress * Math.PI * 2;  // Полный оборот (0 к 2π)
  }
  
  const angle = angleLane * 0.55 + spinRotation;  // ✅ ДОБАВЛЯЕМ СПИН К УГЛУ
  
  const x = DOM.canvas.width / 2 + Math.sin(angle) * r;
  const y = DOM.canvas.height / 2 + Math.cos(angle) * r * CONFIG.PLAYER_OFFSET;
  
  if(!isFinite(x) || !isFinite(y)) {
    return { x: DOM.canvas.width / 2, y: DOM.canvas.height / 2, scale: 1, angle: 0 };
  }
  
  return { x, y, scale, angle };
}

/* ===== UPDATE ===== */
function update(delta) {
  if(!isFinite(gameState.speed) || gameState.speed < 0) { endGame("Speed error"); return; }
  if(!isFinite(gameState.distance) || gameState.distance < 0) { endGame("Distance error"); return; }
  
  gameState.deltaTime = delta;
  
  // ===== СКОРОСТЬ =====
  const speedLevel = Math.floor(gameState.distance / CONFIG.SPEED_INCREMENT_INTERVAL);
  gameState.speed = Math.min(CONFIG.SPEED_START + speedLevel * CONFIG.SPEED_INCREMENT, CONFIG.SPEED_MAX);
  gameState.distance += gameState.speed * 5;

  // ===== СПАВН МОНЕТ =====
  if(Math.floor(gameState.distance / 1500) > Math.floor((gameState.distance - gameState.speed * 5) / 1500)) {
    spawnCoinCircleInner();
  }
  if(Math.floor(gameState.distance / CONFIG.COIN_SPAWN_INTERVAL) > Math.floor(gameState.lastCoinDistance / CONFIG.COIN_SPAWN_INTERVAL)) {
    spawnCoinPattern();
    gameState.lastCoinDistance = gameState.distance;
  }
  if(Math.random() < 0.06 && coins.filter(c => c.type === "silver").length < 4) {
    spawnCoinCluster();
  }

  // ===== СПАВН ПРЕПЯТСТВИЙ И БОНУСОВ =====
  const obstacleSpacing = getSpacing("obstacle");
  if(gameState.distance - gameState.lastObstacleDistance > obstacleSpacing) {
    spawnObstacle();
    gameState.lastObstacleDistance = gameState.distance;
  }
  const bonusSpacing = getSpacing("bonus");
  if(gameState.distance - gameState.lastBonusDistance > bonusSpacing) {
    spawnBonus();
    gameState.lastBonusDistance = gameState.distance;
  }

  // ===== ДВИЖЕНИЕ ОБЪЕКТОВ =====
  obstacles.forEach(o => { o.z -= gameState.speed * 0.8; o.animFrame++; });
  bonuses.forEach(b => { b.z -= gameState.speed * 0.8; b.animFrame++; });
  coins.forEach(c => { c.z -= gameState.speed * 0.8; c.animFrame++; });

  // ===== УДАЛЕНИЕ ОБЪЕКТОВ ЗА ЭКРАНОМ =====
  for(let i = obstacles.length - 1; i >= 0; i--) if(obstacles[i].z <= -0.1) obstacles.splice(i, 1);
  for(let i = bonuses.length - 1; i >= 0; i--) if(bonuses[i].z <= -0.1) bonuses.splice(i, 1);
  for(let i = coins.length - 1; i >= 0; i--) if(coins[i].z <= -0.1) coins.splice(i, 1);

  // ===== СМЕНА ПОЛОСЫ =====
  if(laneCooldown <= 0 && inputQueue.length > 0 && !player.isLaneTransition) {
    const dir = inputQueue.shift();
    const newLane = Math.max(-1, Math.min(1, player.lane + dir));
    if(newLane !== player.lane) {
      player.lanePrev = player.lane;
      player.targetLane = newLane;
      player.laneAnimFrame = 0;
      player.isLaneTransition = true;
      player.state = "transition";
      player.frameIndex = 0;
      player.frameTimer = 0;  // ✅ СБРОС ТАЙМЕРА
      laneCooldown = CONFIG.LANE_COOLDOWN_FRAMES;
    }
  }
  if(laneCooldown > 0) laneCooldown--;

  if(player.isLaneTransition) {
    player.laneAnimFrame++;
    if(player.laneAnimFrame >= CONFIG.LANE_TRANSITION_FRAMES) {
      player.lane = player.targetLane;
      player.isLaneTransition = false;
      player.state = "idle";
      player.frameIndex = 0;
      player.frameTimer = 0;  // ✅ СБРОС ТАЙМЕРА
      inputQueue.length = 0;
    }
  }

  // ===== СПИН ✅ ГЛАВНОЕ =====
  if(gameState.spinActive) {
    gameState.spinProgress += delta;
    
    if(gameState.spinProgress >= CONFIG.SPIN_DURATION) {
      gameState.spinActive = false;
      gameState.spinProgress = 0;
    }
  }

  if(gameState.spinCooldown > 0) gameState.spinCooldown--;

  // ===== МАГНИТ =====
  if(player.magnetActive) {
    player.magnetTimer -= delta;
    if(player.magnetTimer <= 0) player.magnetActive = false;
  }

  // ===== ИНВЕРСИЯ =====
  if(player.invertActive) {
    player.invertTimer -= delta;
    if(player.invertTimer <= 0) player.invertActive = false;
  }

  // ===== МНОЖИТЕЛЬ ОЧКОВ =====
  if(gameState.baseMultiplier > 1) {
    gameState.x2Timer -= delta;
    if(gameState.x2Timer <= 0) gameState.baseMultiplier = 1;
  }

  // ===== ПОЗИЦИЯ ПЕРСОНАЖА =====
  const p = projectPlayer(CONFIG.PLAYER_Z);
  player.x = p.x - CONFIG.FRAME_SIZE / 2;
  player.y = p.y - CONFIG.FRAME_SIZE / 2;

  // ===== СМЕЩЕНИЯ ТРУБЫ =====
  const centerOffsetX = Math.cos(gameState.curveDirection) * gameState.tubeCurveStrength * CONFIG.TUBE_RADIUS * CONFIG.CURVE_OFFSET_X;
  const centerOffsetY = Math.sin(gameState.curveDirection) * gameState.tubeCurveStrength * CONFIG.TUBE_RADIUS * CONFIG.CURVE_OFFSET_Y;

  // ===== КОЛЛИЗИЯ С ПРЕПЯТСТВИЯМИ =====
  for(let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    if(o.z >= CONFIG.PLAYER_Z - 0.05 && o.z <= CONFIG.PLAYER_Z + 0.05 && o.lane === player.lane) {
      if(player.shield) {
        player.shield = false;
        obstacles.splice(i, 1);
      } else {
        endGame(o.subtype);
        return;
      }
    }
  }

  // ===== КОЛЛИЗИЯ С БОНУСАМИ =====
  for(let i = bonuses.length - 1; i >= 0; i--) {
    const b = bonuses[i];
    if(b.z >= CONFIG.PLAYER_Z - 0.1 && b.z <= CONFIG.PLAYER_Z + 0.1 && b.lane === player.lane) {
      applyBonus(b);
      bonuses.splice(i, 1);
    }
  }

  // ===== СБОР МОНЕТ =====
  for(let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    
    // Магнит
    if(player.magnetActive && c.z > 0.05 && c.z < 1.5) {
      const cp = project(c.lane, c.z);
      const playerPos = projectPlayer(CONFIG.PLAYER_Z);
      if(cp && playerPos) {
        const dist = Math.sqrt(Math.pow(cp.x - playerPos.x, 2) + Math.pow(cp.y - playerPos.y, 2));
        if(dist < 150) {
          collectCoin(c);
          coins.splice(i, 1);
          continue;
        }
      }
    }
    
    // Спин (круговые монеты)
    if(player.isSpin && (c.isCircleInner || c.isCircle) && c.z >= CONFIG.PLAYER_Z - 0.2 && c.z <= CONFIG.PLAYER_Z + 0.2) {
      collectCoin(c);
      coins.splice(i, 1);
      continue;
    }
    
    // Обычный сбор монет
    if(typeof c.lane === "number" && c.z >= CONFIG.PLAYER_Z - 0.12 && c.z <= CONFIG.PLAYER_Z + 0.12 && c.lane === player.lane) {
      collectCoin(c);
      coins.splice(i, 1);
    }
  }

  // ===== АНИМАЦИЯ ПЕРСОНАЖА =====
  updatePlayerAnimation(delta);  // ✅ ПЕРЕДАЁМ DELTA

  // ===== ВОЛНЫ ТРУБЫ =====
  gameState.tubeWaveMod += 0.002;

  // ===== КРИВИЗНА ТРУБЫ =====
  gameState.curveTimer += delta * 1000;
  const t = Math.min(1, gameState.curveTimer / gameState.curveTransitionDuration);
  const interp = (1 - Math.cos(Math.PI * t)) / 2;

  gameState.curveDirection = curves.current.direction * (1 - interp) + curves.next.direction * interp;
  gameState.tubeCurveStrength = curves.current.strength * (1 - interp) + curves.next.strength * interp;
  gameState.tubeCurveAngle = Math.cos(gameState.curveDirection) * gameState.tubeCurveStrength * CONFIG.MAX_CURVE_ANGLE;

  if(gameState.curveTimer >= gameState.curveTransitionDuration) {
    curves.current.direction = curves.next.direction;
    curves.current.strength = curves.next.strength;
    curves.next.direction = Math.random() * Math.PI * 2;
    curves.next.strength = 0.5 + Math.random() * 0.5;
    gameState.curveTransitionDuration = CONFIG.MIN_CURVE_TIME + Math.random() * (CONFIG.MAX_CURVE_TIME - CONFIG.MIN_CURVE_TIME);
    gameState.curveTimer = 0;
  }
}


/* ===== BONUS & COINS ===== */
function applyBonus(bonus) {
  audio.play("bonus");
  
  const bonusMap = {
    [BONUS_TYPES.SHIELD]: () => {
      player.shield = true;
      showBonusText("🛡 Shield!");
      spawnParticles(DOM.canvas.width/2, DOM.canvas.height/2, "rgba(100, 200, 255, 1)", 20, 8);
    },
    [BONUS_TYPES.SPEED_DOWN]: () => {
      gameState.speed = Math.max(gameState.speed - CONFIG.SPEED_BONUS_AMOUNT, CONFIG.SPEED_MIN);
      showBonusText("🐌 Slow!");
    },
    [BONUS_TYPES.SPEED_UP]: () => {
      gameState.speed = Math.min(gameState.speed + CONFIG.SPEED_BONUS_AMOUNT, CONFIG.SPEED_MAX);
      showBonusText("⚡ Speed!");
    },
    [BONUS_TYPES.MAGNET]: () => {
      player.magnetActive = true;
      player.magnetTimer = 10;
      showBonusText("🧲 Magnet!");
      spawnParticles(DOM.canvas.width/2, DOM.canvas.height/2, "rgba(255, 100, 200, 1)", 15, 7);
    },
    [BONUS_TYPES.INVERT]: () => {
      player.invertActive = true;
      player.invertTimer = 10;
      showBonusText("🔄 Inverted!");
    },
    [BONUS_TYPES.X2]: () => {
      gameState.baseMultiplier = 2;
      gameState.x2Timer = 10;
      showBonusText("✖2 Score!");
    },
    [BONUS_TYPES.SCORE_300]: () => {
      gameState.score += 300 * gameState.baseMultiplier;
      showBonusText(`+${Math.floor(300 * gameState.baseMultiplier)}`);
      audio.play("coin");
    },
    [BONUS_TYPES.SCORE_500]: () => {
      gameState.score += 500 * gameState.baseMultiplier;
      showBonusText(`+${Math.floor(500 * gameState.baseMultiplier)}`);
      audio.play("bonus");
    }
  };

  const handler = bonusMap[bonus.type];
  if(handler) handler();
}

function collectCoin(coin) {
  if(coin.type === "silver") {
    gameState.score += 10 * gameState.baseMultiplier;
    gameState.silverCoins++;
    audio.play("coin");
  } else if(coin.type === "gold" || coin.type === "gold_spin") {
    gameState.score += 100 * gameState.baseMultiplier;
    gameState.goldCoins++;
    audio.play("coin", { freq: 1200, duration: 0.15 });
    const p = project(coin.lane, coin.z);
    if(p) spawnParticles(p.x, p.y, "rgba(255, 215, 0, 1)", 12, 6);
  }
}

function showBonusText(text) {
  gameState.bonusText = text;
  gameState.bonusTextTimer = 90;
}

function updatePlayerAnimation(delta) {
  player.frameTimer += delta;
  
  const anim = getCurrentAnimation();
  const totalFrames = anim.end - anim.start + 1;
  
  let frameDuration = 0.15;
  if(player.state === "transition") frameDuration = 0.1;
  
  if(player.frameTimer >= frameDuration) {
    player.frameTimer -= frameDuration;
    player.frameIndex = (player.frameIndex + 1) % totalFrames;
  }
  
  if(player.state === "transition" && player.frameIndex === 0) {
    player.state = "idle";
  }
}

function getCurrentAnimation() {
  if(player.state === "spin") return Animations.spin;
  if(player.state === "transition") return player.targetLane < player.lane ? Animations.trans_left : Animations.trans_right;
  switch(player.lane) {
    case -1: return Animations.idle_left;
    case 1: return Animations.idle_right;
    default: return Animations.idle_center;
  }
}

function getSegmentColor(angle, index) {
  const hue = (angle * 180 / Math.PI + index * 8) % 360;
  const r = 140 + Math.sin(hue * Math.PI / 180) * 30;
  const g = 60 + Math.cos(hue * Math.PI / 180) * 20;
  const b = 70 + Math.sin(hue * Math.PI / 180 * 0.5) * 25;
  
  return `rgb(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)})`;
}

class TubeRenderer {
  constructor() {
    this.lastRotation = 0;
  }

  draw() {
    const rotSpeed = Math.min(CONFIG.BASE_ROTATION_SPEED * gameState.speed * 18, CONFIG.MAX_ROTATION_SPEED);
    gameState.tubeRotation += rotSpeed * 0.01;
    gameState.tubeScroll += gameState.speed * 40;

    const centerOffsetX = Math.cos(gameState.curveDirection) * gameState.tubeCurveStrength * CONFIG.TUBE_RADIUS * CONFIG.CURVE_OFFSET_X;
    const centerOffsetY = Math.sin(gameState.curveDirection) * gameState.tubeCurveStrength * CONFIG.TUBE_RADIUS * CONFIG.CURVE_OFFSET_Y;

    // ✅ ВСЕГДА рисуем трубку (это самый быстрый способ)
    for(let d = CONFIG.TUBE_DEPTH_STEPS - 1; d >= 0; d--) {
      const z1 = d * CONFIG.TUBE_Z_STEP;
      const z2 = (d + 1) * CONFIG.TUBE_Z_STEP;
      const scale1 = 1 - z1;
      const scale2 = 1 - z2;

      if(scale2 <= 0) continue;

      const innerR = CONFIG.TUBE_RADIUS * 0.15;
      const r1 = Math.max(innerR, CONFIG.TUBE_RADIUS * scale1);
      const r2 = Math.max(innerR, CONFIG.TUBE_RADIUS * scale2);

      for(let i = 0; i < CONFIG.TUBE_SEGMENTS; i++) {
        const u = i / CONFIG.TUBE_SEGMENTS;
        const uNext = (i + 1) / CONFIG.TUBE_SEGMENTS;

        const baseAngle1 = u * Math.PI * 2 + gameState.tubeRotation;
        const baseAngle2 = uNext * Math.PI * 2 + gameState.tubeRotation;

        const angle1 = baseAngle1 + gameState.tubeCurveAngle;
        const angle2 = baseAngle2 + gameState.tubeCurveAngle;

        const bendInf1 = 1 - scale1;
        const bendInf2 = 1 - scale2;

        const x1 = DOM.canvas.width/2 + Math.sin(angle1) * r1 + centerOffsetX * bendInf1;
        const y1 = DOM.canvas.height/2 + Math.cos(angle1) * r1 * CONFIG.PLAYER_OFFSET + centerOffsetY * bendInf1;

        const x2 = DOM.canvas.width/2 + Math.sin(angle2) * r1 + centerOffsetX * bendInf1;
        const y2 = DOM.canvas.height/2 + Math.cos(angle2) * r1 * CONFIG.PLAYER_OFFSET + centerOffsetY * bendInf1;

        const x3 = DOM.canvas.width/2 + Math.sin(angle2) * r2 + centerOffsetX * bendInf2;
        const y3 = DOM.canvas.height/2 + Math.cos(angle2) * r2 * CONFIG.PLAYER_OFFSET + centerOffsetY * bendInf2;

        const x4 = DOM.canvas.width/2 + Math.sin(angle1) * r2 + centerOffsetX * bendInf2;
        const y4 = DOM.canvas.height/2 + Math.cos(angle1) * r2 * CONFIG.PLAYER_OFFSET + centerOffsetY * bendInf2;

        ctx.fillStyle = getSegmentColor(baseAngle1, i);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.lineTo(x3, y3);
        ctx.lineTo(x4, y4);
        ctx.closePath();
        ctx.fill();
      }
    }
  }
}

const tubeRenderer = new TubeRenderer();

function drawTube() {
  tubeRenderer.draw();  // ✅ ВСЕГДА вызываем draw()
}

function drawTubeDepth() {
  const centerOffsetX = Math.cos(gameState.curveDirection) * gameState.tubeCurveStrength * CONFIG.TUBE_RADIUS * CONFIG.CURVE_OFFSET_X;
  const centerOffsetY = Math.sin(gameState.curveDirection) * gameState.tubeCurveStrength * CONFIG.TUBE_RADIUS * CONFIG.CURVE_OFFSET_Y;
  
  const cx = DOM.canvas.width/2 + centerOffsetX;
  const cy = DOM.canvas.height/2 + centerOffsetY;
  
  if(!isFinite(cx) || !isFinite(cy)) return;
  
  const grad = ctx.createRadialGradient(cx, cy, CONFIG.TUBE_RADIUS * 0.1, cx, cy, CONFIG.TUBE_RADIUS);
  grad.addColorStop(0, "rgba(0,0,0,0.85)");
  grad.addColorStop(0.15, "rgba(0,0,0,0.7)");
  grad.addColorStop(0.4, "rgba(0,0,0,0.3)");
  grad.addColorStop(1, "rgba(0,0,0,0)");

  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, CONFIG.TUBE_RADIUS, 0, Math.PI*2);
  ctx.fill();
}

function drawTubeCenter() {
  const centerOffsetX = Math.cos(gameState.curveDirection) * gameState.tubeCurveStrength * CONFIG.TUBE_RADIUS * CONFIG.CURVE_OFFSET_X;
  const centerOffsetY = Math.sin(gameState.curveDirection) * gameState.tubeCurveStrength * CONFIG.TUBE_RADIUS * CONFIG.CURVE_OFFSET_Y;
  
  const cx = DOM.canvas.width/2 + centerOffsetX;
  const cy = DOM.canvas.height/2 + centerOffsetY;
  
  if(!isFinite(cx) || !isFinite(cy)) return;
  
  const outerR = CONFIG.TUBE_RADIUS * 0.18;
  
  const grad1 = ctx.createRadialGradient(cx, cy, CONFIG.TUBE_RADIUS * 0.08, cx, cy, outerR);
  grad1.addColorStop(0, "rgba(20,20,40,0.9)");
  grad1.addColorStop(0.5, "rgba(40,20,50,0.7)");
  grad1.addColorStop(1, "rgba(30,10,30,0.4)");
  
  ctx.fillStyle = grad1;
  ctx.beginPath();
  ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
  ctx.fill();
  
  const grad2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, CONFIG.TUBE_RADIUS * 0.08);
  grad2.addColorStop(0, "rgba(10,5,15,1)");
  grad2.addColorStop(1, "rgba(20,10,25,0.8)");
  
  ctx.fillStyle = grad2;
  ctx.beginPath();
  ctx.arc(cx, cy, CONFIG.TUBE_RADIUS * 0.08, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.strokeStyle = "rgba(100,60,80,0.5)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, CONFIG.TUBE_RADIUS * 0.15, 0, Math.PI * 2);
  ctx.stroke();
}

function drawCoins() {
  const centerOffsetX = Math.cos(gameState.curveDirection) * gameState.tubeCurveStrength * CONFIG.TUBE_RADIUS * CONFIG.CURVE_OFFSET_X;
  const centerOffsetY = Math.sin(gameState.curveDirection) * gameState.tubeCurveStrength * CONFIG.TUBE_RADIUS * CONFIG.CURVE_OFFSET_Y;
  const atlas2 = assetManager.getAsset('atlas2');

  if(!atlas2) return;

  coins.forEach(coin => {
    if(!coin) return;
    
    const animRow = 0;
    const animStart = coin.type === "silver" ? 4 : 0;
    const frame = animStart + (coin.animFrame % 4);
    
    if(coin.isCircleInner) {
      if(coin.z < -0.1 || coin.z > 1.6) return;
      
      const scale = Math.max(0.05, 1 - coin.z);
      const r = CONFIG.TUBE_RADIUS * scale * coin.radiusFactor;
      const bendInf = 1 - scale;
      const offsetX = centerOffsetX * bendInf;
      const offsetY = centerOffsetY * bendInf;
      
      const x = DOM.canvas.width / 2 + Math.sin(coin.angle) * r + offsetX;
      const y = DOM.canvas.height / 2 + Math.cos(coin.angle) * r * CONFIG.PLAYER_OFFSET + offsetY;
      const sz = Math.max(32, CONFIG.FRAME_SIZE * scale * 1.2);
      
      ctx.save();
      ctx.shadowBlur = 30;
      ctx.shadowColor = coin.type === "gold_spin" ? "rgba(255,255,100,1)" : "rgba(150,220,255,1)";
      ctx.drawImage(atlas2, frame * CONFIG.FRAME_SIZE, animRow * CONFIG.FRAME_SIZE, CONFIG.FRAME_SIZE, CONFIG.FRAME_SIZE, x - sz/2, y - sz/2, sz, sz);
      ctx.restore();
      return;
    }
    
    const p = project(coin.lane, coin.z);
    if(!p || p.scale <= 0.01) return;
    
    const bendInf = 1 - p.scale;
    const offsetX = centerOffsetX * bendInf;
    const offsetY = centerOffsetY * bendInf;
    const sz = Math.max(24, CONFIG.FRAME_SIZE * p.scale * 0.95);
    
    ctx.save();
    ctx.shadowBlur = 15;
    ctx.shadowColor = coin.type === "gold" ? "rgba(255,200,0,0.8)" : "rgba(200,200,200,0.6)";
    ctx.drawImage(atlas2, frame * CONFIG.FRAME_SIZE, animRow * CONFIG.FRAME_SIZE, CONFIG.FRAME_SIZE, CONFIG.FRAME_SIZE, p.x - sz/2 + offsetX, p.y - sz/2 + offsetY, sz, sz);
    ctx.restore();
  });
}

function drawPlayer() {
  const atlas = assetManager.getAsset('atlas');
  if(!atlas) return;
  
  // ✅ Рассчитываем кадр на основе спин п��огресса
  let frameX, frameY;
  
  if(gameState.spinActive && gameState.spinProgress >= 0) {
    const spinProgress = gameState.spinProgress / CONFIG.SPIN_DURATION;
    const currentFrame = Math.floor(spinProgress * 14);
    
    if(currentFrame < 7) {
      frameX = currentFrame;
      frameY = 3;
    } else {
      frameX = currentFrame - 7;
      frameY = 4;
    }
  } else {
    const anim = getCurrentAnimation();
    frameX = anim.start + player.frameIndex;
    frameY = anim.row;
  }
  
  const p = projectPlayer(CONFIG.PLAYER_Z);
  const spriteSize = CONFIG.FRAME_SIZE;
  const displaySize = spriteSize * 1.5;
  
  const screenX = p.x - displaySize / 2;
  const screenY = p.y - displaySize / 2;
  
  // Тень
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
  ctx.beginPath();
  ctx.ellipse(p.x, p.y + displaySize * 0.3, displaySize * 0.6, displaySize * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  
  // ✅ БЕЗ ctx.rotate() - спин уже в projectPlayer()!
  ctx.save();
  
  ctx.drawImage(
    atlas,
    frameX * spriteSize,
    frameY * spriteSize,
    spriteSize,
    spriteSize,
    screenX,
    screenY,
    displaySize,
    displaySize
  );
  
  ctx.restore();
}

function drawObjects() {
  const renderList = [];
  const centerOffsetX = Math.cos(gameState.curveDirection) * gameState.tubeCurveStrength * CONFIG.TUBE_RADIUS * CONFIG.CURVE_OFFSET_X;
  const centerOffsetY = Math.sin(gameState.curveDirection) * gameState.tubeCurveStrength * CONFIG.TUBE_RADIUS * CONFIG.CURVE_OFFSET_Y;
  const atlas2 = assetManager.getAsset('atlas2');

  if(!atlas2) return;

  obstacles.forEach(o => {
    if(o.z > -0.2 && o.z < 1.6) {
      renderList.push({ type: "obstacle", z: o.z, obj: o });
    }
  });

  bonuses.forEach(b => {
    if(b.z > -0.2 && b.z < 1.6) {
      renderList.push({ type: "bonus", z: b.z, obj: b });
    }
  });

  renderList.sort((a, b) => b.z - a.z);

  const bonusFrameMap = {
    [BONUS_TYPES.SHIELD]: (frame) => [1, Math.floor(frame / 6) % 3],
    [BONUS_TYPES.SPEED_DOWN]: (frame) => [1, 3],
    [BONUS_TYPES.SPEED_UP]: (frame) => [1, 4],
    [BONUS_TYPES.MAGNET]: (frame) => [1, 5 + Math.floor(frame / 5) % 3],
    [BONUS_TYPES.X2]: (frame) => [2, 4 + Math.floor(frame / 10) % 2],
    [BONUS_TYPES.INVERT]: (frame) => [2, 6 + Math.floor(frame / 8) % 2],
    [BONUS_TYPES.SCORE_300]: (frame) => [2, Math.floor(frame / 8) % 2],
    [BONUS_TYPES.SCORE_500]: (frame) => [2, 2 + Math.floor(frame / 8) % 2]
  };

  const obstacleTypeMap = {
    pit: [3, 0],
    spikes: [3, 1],
    rock1: [4, 3],
    rock2: [4, 4],
    bull: [4, 6]
  };

  renderList.forEach(item => {
    const o = item.obj;
    const p = project(o.lane, o.z);
    if(!p || p.scale <= 0.01) return;

    const bendInf = 1 - p.scale;
    const offsetX = centerOffsetX * bendInf;
    const offsetY = centerOffsetY * bendInf;

    if(item.type === "obstacle") {
      let row = 3, col = 0;
      
      switch(o.subtype) {
        case "pit": row = 3; col = 0; break;
        case "spikes": row = 3; col = 1; break;
        case "bottles": row = 3; col = 2 + Math.floor((o.animFrame / 8) % 1); break;
        case "wall_brick": row = 3; col = 4; break;
        case "wall_kactus": row = 3; col = 5; break;
        case "tree": row = 3; col = 6; break;
        case "rock1": row = 4; col = 3; break;
        case "rock2": row = 4; col = 4; break;
        case "fence": row = 4; col = 0 + Math.floor((o.animFrame / 10) % 3); break;
        case "bull": row = 4; col = 5 + Math.floor((o.animFrame / 10) % 3); break;
        default: row = 3; col = 0;
      }
      
      const sz = Math.max(40, CONFIG.FRAME_SIZE * p.scale);
      
      ctx.drawImage(
        atlas2, 
        col * CONFIG.FRAME_SIZE, 
        row * CONFIG.FRAME_SIZE, 
        CONFIG.FRAME_SIZE, 
        CONFIG.FRAME_SIZE, 
        p.x - sz/2 + offsetX, 
        p.y - sz/2 + offsetY, 
        sz, 
        sz
      );
    } else {
      const frameMap = bonusFrameMap[o.type];
      if(!frameMap) return;
      
      const [row, col] = frameMap(o.animFrame);
      const sz = Math.max(15, CONFIG.FRAME_SIZE * p.scale * 0.9);
      
      ctx.drawImage(
        atlas2, 
        col * CONFIG.FRAME_SIZE, 
        row * CONFIG.FRAME_SIZE, 
        CONFIG.FRAME_SIZE, 
        CONFIG.FRAME_SIZE, 
        p.x - sz/2 + offsetX, 
        p.y - sz/2 + offsetY, 
        sz, 
        sz
      );
    }
  });
}

function drawBonusText() {
  gameState.bonusTextTimer--;
  
  if(gameState.bonusTextTimer <= 0) return;
  const alpha = Math.min(1, gameState.bonusTextTimer / 20);

}

      method: "eth_requestAccounts"
    });
    
    if(!accounts || accounts.length === 0) {
      alert("❌ Ошибка подключения кошелька");
      return;

    userWallet = accounts[0];
    isWalletConnected = true;
    
    const provider = new ethers.providers.Web3Provider(window.ethereum);
    web3 = provider;
    
    await updateWalletUI();
    showBonusText(`✅ Кошелёк подключен!`);
    
    // ✅ Перезагружаем лидерборд с инфо о кошельке
    await loadAndDisplayLeaderboard();
    
  } catch(error) {
    console.error("Ошибка:", error);

      alert("❌ Вы отклонили запрос");

// ✅ Синхронизация локальных результатов при восстановлении соединения
async function syncOfflineResults() {
  try {
    const localResults = JSON.parse(localStorage.getItem("gameResults") || "[]");
    
    if(localResults.length === 0) {
      console.log("✅ Нет локальных результатов для синхронизации");
      return;
    }

    console.log(`📤 Синхронизирую ${localResults.length} локальных результатов...`);
    
    for(const result of localResults) {
      if(!result.wallet) continue;  // Пропускаем результаты без кошелька
      
      try {
        const response = await fetch(`${BACKEND_URL}/api/leaderboard/save`, {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "X-Wallet": result.wallet
          },
          body: JSON.stringify(result)
        });

        if(response.ok) {
          console.log("✅ Локальный результат синхронизирован:", result.score);
        }
      } catch(e) {
        console.warn("⚠️ Не удалось синхронизировать результат:", e);
      }
    }

    // ✅ Очищаем локальное хранилище после успешной синхронизации
    localStorage.setItem("gameResults", "[]");
    console.log("✅ Локальное хранилище очищено");
    
  } catch(e) {
    console.error("❌ Ошибка синхронизации:", e);
  }
}

    console.log(`📅 Дата: ${new Date(timestamp).toISOString()}`);
    
    // ✅ Формируем сообщение для подписи (должно совпадать с бэкендом!)
    const messageToSign = `Save game result\nWallet: ${userWallet}\nScore: ${Math.floor(gameState.score)}\nDistance: ${Math.floor(gameState.distance)}\nTimestamp: ${timestamp}`;
    
    console.log("📝 Сообщение для подписи:");
    console.log(messageToSign);
    
    console.log("📝 Подписываю сообщение...");
    const signature = await signMessage(messageToSign);
    
    if(!signature) {
      console.error("❌ Не удалось получить подпись");
      return;
    }
    
    console.log(`✍️ Подпись получена: ${signature.substring(0, 20)}...`);

    const data = {
      wallet: userWallet,
      score: Math.floor(gameState.score),
      distance: Math.floor(gameState.distance),
      goldCoins: gameState.goldCoins,
      silverCoins: gameState.silverCoins,
      timestamp: timestamp,  // ✅ Миллисекунды!
      signature: signature
    };
    
    console.log("💾 Отправляю данные на сервер:");
    console.log(JSON.stringify(data, null, 2));
    
    const response = await fetch(`${BACKEND_URL}/api/leaderboard/save`, {
      method: "POST",
      headers: { 
        "Content-Type": "application/json",
        "X-Wallet": userWallet
      },
      body: JSON.stringify(data)
    });

    console.log(`📊 Статус ответа: ${response.status}`);
    
    if(response.ok) {
      const result = await response.json();
      console.log("✅ Результат сохранён на сервере!", result);
      showBonusText("✅ В лидерборде!");
      
      // ✅ Обновляем лидерборд и позицию
      await loadAndDisplayLeaderboard();
      await updateWalletUI();
    } else {
      console.error("❌ Ошибка при сохранении:", response.status);
      const error = await response.json();
      console.error("Детали ошибки:", error);
      
      // ✅ Fallback: сохраняем локально
      saveToLocalStorage(data);
      showBonusText("⚠️ Локальное сохранение");
    }
    
  } catch(error) {
    console.error("❌ Ошибка отправки результата:", error);
    showBonusText("❌ Ошибка сохранения");
    
    // ✅ Fallback
    saveToLocalStorage({
      wallet: userWallet,
      score: Math.floor(gameState.score),
      distance: Math.floor(gameState.distance),
      goldCoins: gameState.goldCoins,
      silverCoins: gameState.silverCoins,
      timestamp: Date.now()
    });
  }
}

function saveToLocalStorage(data) {
  try {
    const allResults = JSON.parse(localStorage.getItem("gameResults") || "[]");
    allResults.push(data);
    if(allResults.length > 10) allResults.shift();
    localStorage.setItem("gameResults", JSON.stringify(allResults));
  } catch(e) {
    console.error("Local storage error:", e);
  }
}

async function fetchLeaderboard() {
  try {
    console.log("📡 Загружаю лидерборд с сервера...");
    
    const url = isWalletConnected 
      ? `${BACKEND_URL}/api/leaderboard/top?wallet=${userWallet}`
      : `${BACKEND_URL}/api/leaderboard/top`;
    
    console.log(`📤 Запрос: ${url}`);
    
    // ✅ Добавляем timeout
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 5000);  // 5 сек
    
    const response = await fetch(url, { signal: controller.signal });
    clearTimeout(timeoutId);
    
    if(response.ok) {
      const data = await response.json();
      console.log("✅ Лидерборд загружен:", data);
      displayLeaderboard(data.leaderboard, data.playerPosition);
      DOM.leaderboard.classList.add("visible");
      return;
    } else {
      throw new Error(`HTTP ${response.status}`);
    }
  } catch(e) {
    console.error("❌ Ошибка подключения к серверу:", e);
    
    // ✅ FALLBACK: показываем локальные результаты
    loadLocalLeaderboard();
  }
}
function loadLocalLeaderboard() {
  console.log("📂 Загружаю локальный лидерборд...");
  try {
    const localResults = JSON.parse(localStorage.getItem("gameResults") || "[]");
    
    if(localResults.length === 0) {
      DOM.leaderboardList.innerHTML = `
        <div style="opacity: 0.6; text-align: center; padding: 20px;">
          Нет данных<br>
          <span style="font-size: 12px;">Подключите MetaMask для лидерборда</span>
        </div>
      `;
      return;
    }

    // ✅ Сортируем и форматируем локальные результаты
    const sorted = localResults
      .sort((a, b) => (b.score || 0) - (a.score || 0))
      .slice(0, 10);

    let html = '<div style="margin-bottom: 10px;"><strong style="color: #ffdd00;">📂 ЛОКАЛЬНЫЕ</strong></div>';
    
    sorted.forEach((entry, idx) => {
      html += `
        <div class="leaderboard-entry">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
            <span><strong>#${idx + 1}</strong> ${entry.wallet ? entry.wallet.slice(0, 6) + '...' + entry.wallet.slice(-4) : 'Local'}</span>
            <span style="color: #ffdd00; font-weight: bold;">⭐ ${entry.score || 0}</span>
          </div>
          <div style="font-size: 10px; opacity: 0.7;">
            🛹 ${entry.distance || 0}м | 💛 ${entry.goldCoins || 0} | ⭐ ${entry.silverCoins || 0}
          </div>
        </div>
      `;
    });

    DOM.leaderboardList.innerHTML = html;
    DOM.leaderboard.classList.add("visible");
    
  } catch(e) {
    console.error("Ошибка локального лидерборда:", e);
  }
}
function displayLeaderboard(leaderboard, playerPosition) {
  // ✅ Отображаем топ-10 без дублей (один кошелек = одна строка)
  let html = '';
  
  if(leaderboard && leaderboard.length > 0) {
    html += leaderboard
      .slice(0, 10)
      .map((entry, idx) => {
        const isCurrentPlayer = entry.wallet === userWallet;
        const highlight = isCurrentPlayer ? 'background: rgba(76, 175, 80, 0.2); border: 1px solid #4caf50;' : '';
        
        return `
          <div style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #444;
            ${highlight}
            margin-bottom: 4px;
            border-radius: 4px;
          ">
            <span style="color: #ffdd00; font-weight: bold; min-width: 25px;">#${idx + 1}</span>
            <span style="flex: 1; margin-left: 8px; overflow: hidden; text-overflow: ellipsis;">
              ${entry.wallet.slice(0, 6)}...${entry.wallet.slice(-4)}
              ${isCurrentPlayer ? ' 👤' : ''}
            </span>
            <span style="color: #ffff00; font-weight: bold; min-width: 80px; text-align: right;">
              ⭐ ${entry.totalScore}
            </span>
          </div>
        `;
      })
      .join('');
  } else {
    html = '<div style="opacity: 0.6; text-align: center; padding: 20px;">Нет данных</div>';
  }
  
  // ✅ Отображаем на стартовой странице
  const startList = document.getElementById('startLeaderboardList');
  if(startList) {
    startList.innerHTML = html;
  }
  
  // ✅ Отображаем на странице Game Over
  const gameOverList = document.getElementById('gameOverLeaderboardList');
  if(gameOverList) {
    gameOverList.innerHTML = html;
  }
}

// ✅ НОВАЯ функция: Загрузить и показать лидерборд на стартовой странице
async function loadAndDisplayLeaderboard() {
  try {
    console.log("📡 Загружаю лидерборд...");
    
    // ✅ Если кошелек подключен, добавляем wallet в параметр
    const url = isWalletConnected 
      ? `${BACKEND_URL}/api/leaderboard/top?wallet=${userWallet}`
      : `${BACKEND_URL}/api/leaderboard/top`;
    
    console.log(`📤 Запрос к: ${url}`);
    
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 5000);
    
    const response = await fetch(url, { 
      signal: controller.signal,
      headers: {
        'Content-Type': 'application/json'
      }
    });
    
    clearTimeout(timeoutId);
    
    if(!response.ok) {
      console.error(`❌ HTTP ошибка: ${response.status}`);
      throw new Error(`HTTP ${response.status}`);
    }
    
    const data = await response.json();
    console.log("✅ Лидерборд загружен:", data);
    displayLeaderboard(data.leaderboard, data.playerPosition);
    
  } catch(e) {
    console.error("❌ Ошибка лидерборда:", e);
    loadLocalLeaderboardDisplay();
  }
}

// ✅ НОВАЯ функция: Локальный лидерборд
function loadLocalLeaderboardDisplay() {
  console.log("📂 Отображаю локальный лидерборд...");
  try {
    const localResults = JSON.parse(localStorage.getItem("gameResults") || "[]");
    
    // ✅ Группируем по кошельку, берём лучший результат каждого
    const playerBests = {};
    localResults.forEach(result => {
      const wallet = result.wallet || 'Local';
      if(!playerBests[wallet] || result.score > playerBests[wallet].score) {
        playerBests[wallet] = result;
      }
    });
    
    // ✅ Сортируем и отображаем
    const sorted = Object.values(playerBests)
      .sort((a, b) => (b.score || 0) - (a.score || 0))
      .slice(0, 10);
    
    let html = '';
    if(sorted.length > 0) {
      html = sorted
        .map((entry, idx) => `
          <div style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #444;
            margin-bottom: 4px;
            border-radius: 4px;
          ">
            <span style="color: #ffdd00; font-weight: bold; min-width: 25px;">#${idx + 1}</span>
            <span style="flex: 1; margin-left: 8px;">
              ${entry.wallet ? entry.wallet.slice(0, 6) + '...' + entry.wallet.slice(-4) : 'Local'}
            </span>
            <span style="color: #ffff00; font-weight: bold; min-width: 80px; text-align: right;">
              ⭐ ${entry.score || 0}
            </span>
          </div>
        `)
        .join('');
    } else {
      html = '<div style="opacity: 0.6; text-align: center; padding: 20px;">Нет данных</div>';
    }
    
    const startList = document.getElementById('startLeaderboardList');
    if(startList) startList.innerHTML = html;
    
    const gameOverList = document.getElementById('gameOverLeaderboardList');
    if(gameOverList) gameOverList.innerHTML = html;
    
  } catch(e) {
    console.error("Ошибка локального лидерборда:", e);
  }
}
/* ===== MAIN LOOP ===== */
async function gameLoop(time) {
  if(!assetManager.isReady()) {
    const progress = assetManager.getProgress();
    ctx.clearRect(0, 0, DOM.canvas.width, DOM.canvas.height);
    ctx.fillStyle = "white";
    ctx.font = "18px Arial";
    ctx.textAlign = "center";
    ctx.fillText(`⏳ Loading ${Math.floor(progress)}%`, DOM.canvas.width/2, DOM.canvas.height/2);
    requestAnimationFrame(gameLoop);
    return;
  }

  // ✅ Правильный расчёт delta
  if(gameState.lastTime === 0) {
    gameState.lastTime = time;
  }
  const delta = (time - gameState.lastTime) / 1000;
  gameState.lastTime = time;

  // ✅ ОТЛАДКА: выводим состояние каждый 3-й кадр
  if(Math.random() < 0.03 && player.state === "spin") {
    console.log(`🎮 GAMELOOP: delta=${delta.toFixed(4)}, frameIndex=${player.frameIndex}, frameTimer=${player.frameTimer.toFixed(4)}, spinActive=${gameState.spinActive}`);
  }

  ctx.clearRect(0, 0, DOM.canvas.width, DOM.canvas.height);
  ctx.fillStyle = "linear-gradient(135deg, #0a0a15, #15080f)";
  ctx.fillRect(0, 0, DOM.canvas.width, DOM.canvas.height);

  try {
    drawTube();
    drawTubeDepth();
    drawTubeCenter();
    drawObjects();
    drawCoins();
    drawPlayer();
    drawParticles();
  } catch(e) {
    console.error("Draw error:", e);
  }

  if(gameState.running) {
    try {
      update(delta);
      updateParticles();
    } catch(e) {
      console.error("Update error:", e);
      endGame("Error");
    }
  }

  drawBonusText();
  updateUI();

  requestAnimationFrame(gameLoop);
}

// Start
resizeCanvas();
assetManager.loadAll().then(() => {
  // ✅ НОВОЕ: Загружаем лидерборд при загрузке страницы (даже без кошелька)
  loadAndDisplayLeaderboard();
  
  requestAnimationFrame(gameLoop);
  
  if(window.ethereum) {
    window.ethereum.on('accountsChanged', (accounts) => {
      if(accounts.length === 0) {
        isWalletConnected = false;
        userWallet = null;
      } else {
        userWallet = accounts[0];
        isWalletConnected = true;
      }
      updateWalletUI();
    });
    
    window.ethereum.on('chainChanged', () => {
      location.reload();
    });
  }
});
</script>
