<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ursas Tube — Phaser Preview</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #05060b;
      color: #fff;
      font-family: Inter, system-ui, -apple-system, sans-serif;
    }

    .layout {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .header {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(6, 10, 20, 0.9);
      backdrop-filter: blur(6px);
    }

    .header b { color: #9dc8ff; }

    #gameViewport {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="header">
      <b>Phaser Preview</b> — isolated renderer experiment from <code>experiments/phaser/</code>
    </div>
    <div id="gameViewport"></div>
  </div>
  <script type="module" src="../js/phaser-preview.js"></script>
</body>
</html>
